specVersion: 1.0.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ConstantProductAMM
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      # Replace with ConstantProductAMM from deployments/base-sepolia.json after deploy
      abi: AMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - LiquidityMint
        - PoolDayData
        - Protocol
      abis:
        - name: AMM
          file: ./abis/ConstantProductAMM.json
      eventHandlers:
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleSwap
        - event: Mint(indexed address,uint256,uint256,uint256)
          handler: handleMint
      file: ./src/mapping.ts
